<!DOCTYPE html>
<html lang='en'>

<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Natalie's Hairstudio - Store</title>
    <link rel='stylesheet' href='../global.css'>
    <link rel='stylesheet' href='store.css'>
</head>

<body>
    <div id="header"></div>
    <script>
    fetch('/header_nav.html')
        .then(r => r.text())
        .then(html => {
            document.getElementById('header').innerHTML = html;
        });
    </script>
    
    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>A coleção de produtos profissionais</h1>
            <p>Descubra a nossa seleção de produtos de alta qualidade.</p>
        </div>
    </section>

    <!-- Filters Section -->
    <section class="shop-section">
        <div class="controls-wrapper">
            <div class="tabs">
                <button class="tab active" data-category="all">All</button>
                <button class="tab" data-category="shampoo">Shampoo</button>
                <button class="tab" data-category="conditioner">Conditioner</button>
                <button class="tab" data-category="serums">Serums</button>
                <button class="tab" data-category="styling">Styling</button>
            </div>
        </div>

        <!-- Products Grid -->
        <div class="products-grid" id="productsGrid">
            <!-- Products will be inserted here by JavaScript -->
        </div>
    </section>


    <div id="footer"></div>
    <script src="store.js"> </script>
    <script>

    fetch('/footer.html')
        .then(r => r.text())
        .then(html => {
            document.getElementById('footer').innerHTML = html;
        });

    </script>
</body>

</html>
