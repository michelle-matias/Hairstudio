<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f9f9f9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
            padding: 40px 20px;
        }

        footer {
            background: #fff;
            border-top: 1px solid #efefef;
            padding: 24px 20px;
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        .header-contact {
            display: flex;
            gap: 2rem;
            color: #666;
            font-weight: 500;
        }

        .header-contact span {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            footer {
                padding: 16px 20px;
            }
        }
    </style>
</head>
<body>
    
    <footer>
        <div class="header-top">
            <div class="header-contact">
                <span>📞 +351 249 332 XXX</span>
                <span>📧 natalie@hairstudio.pt</span>
            </div>
            <div style="color: #999; font-size: 0.8rem;">
                Seg-Sex: 09:00 - 19:00 | Sab: 10:00 - 16:00
            </div>
        </div>
    </footer>
</body>
</html>
