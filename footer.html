<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f9f9f9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
            padding: 40px 20px;
        }

        footer {
            background: #fff;
            border-top: 1px solid #efefef;
            padding: 24px 20px;
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        footer a {
            color: #7c3aed;
            text-decoration: none;
            margin: 0 8px;
        }

        footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            footer {
                padding: 16px 20px;
            }
        }
    </style>
</head>
<body>
    
    <footer>
        © 2026 Natalie's Hairstudio • 
        <a href="#privacy">Privacy</a>
        <a href="#terms">Terms</a>
        <a href="#contact">Contact</a>
    </footer>
</body>
</html>
