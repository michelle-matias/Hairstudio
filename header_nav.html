<!DOCTYPE html>
<html lang='pt'>

<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Natalie's Hairstudio</title>
    <link rel='stylesheet' href='../global.css'>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
        }

        header {
            background: #fff;
            box-shadow: 0 2px 12px rgba(198, 139, 119, 0.12);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-top {
            background: #ffffff ;
            padding: 0.75rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ffffff;
            font-size: 0.85rem;
        }


        .nav-main {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 3rem;
            flex: 1;
        }

        .logo {
            font-size: 1.85rem;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(135deg, var(--main-color) 0%, #d9956a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            white-space: nowrap;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.02);
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 0;
            align-items: center;
        }

        nav ul li {
            position: relative;
        }

        nav ul li a {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #2d2d2d;
            text-decoration: none;
            padding: 0.8rem 1.5rem;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            position: relative;
            letter-spacing: 0.3px;
        }

        nav ul li a::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 1.5rem;
            right: 1.5rem;
            height: 3px;
            background: linear-gradient(90deg, var(--main-color), #d9956a);
            border-radius: 3px 3px 0 0;
            transform: scaleX(0);
            transform-origin: center;
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        nav ul li a:hover {
            color: var(--main-color);
            background: linear-gradient(180deg, rgba(198, 139, 119, 0.05) 0%, transparent 100%);
        }

        nav ul li a:hover::before {
            transform: scaleX(1);
        }

        .cta-button {
            background: linear-gradient(135deg, var(--main-color) 0%, #d9956a 100%);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(198, 139, 119, 0.25);
            letter-spacing: 0.3px;
            margin-left: 1rem;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(198, 139, 119, 0.35);
        }

        .cta-button:active {
            transform: translateY(0);
        }

        @media (max-width: 1024px) {
            .header-top {
                padding: 0.6rem 1.5rem;
            }

            .header-contact {
                gap: 1.5rem;
                font-size: 0.8rem;
            }

            .nav-main {
                padding: 1.25rem 1.5rem;
            }

            nav ul li a {
                padding: 0.7rem 1.2rem;
                font-size: 0.9rem;
            }

            nav ul li a::before {
                left: 1.2rem;
                right: 1.2rem;
            }

            .cta-button {
                padding: 0.7rem 1.5rem;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 768px) {
            .header-top {
                flex-direction: column;
                gap: 0.5rem;
                padding: 0.5rem 1rem;
            }

            .header-contact {
                gap: 1rem;
                width: 100%;
                justify-content: center;
            }

            .nav-main {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }

            .logo-section {
                width: 100%;
                justify-content: center;
            }

            .logo {
                font-size: 1.5rem;
            }

            nav ul {
                flex-wrap: wrap;
                justify-content: center;
                width: 100%;
            }

            nav ul li a {
                padding: 0.6rem 1rem;
                font-size: 0.85rem;
            }

            .cta-button {
                width: 100%;
                margin: 0;
                margin-top: 0.5rem;
            }
        }
    </style>
</head>

<body>
    <header>

        <nav class="nav-main">
            <div class="logo-section">
                <div class="logo">Natalie's</div>
                <ul>
                    <li><a href='../main/main.html'>Home</a></li>
                    <li><a href='../services/services.html'>Serviços</a></li>
                    <li><a href='../gallery/gallery.html'>Galeria</a></li>
                    <li><a href='../store/store.html'>Loja</a></li>
                    <li><a href='../contact/contact.html'>Contactos</a></li>
                </ul>
            </div>
        </nav>
    </header>

</body>

</html>
